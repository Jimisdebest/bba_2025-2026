<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BBA Klassenwebsite - Home</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="BBA-Logo.png" type="image/x-icon">
</head>
  <script>
<script>
<script>
(function () {
  const NORMAAL = "bba_2025";
  const PRIVE = "Jimschool10";
  const dag = new Date().getDay(); // 4 = donderdag

  // Skip op de onderhoudspagina zelf (daar geen prompt)
  const isOnderhoud = /onderhoud\.html(\?|#|$)/i.test(location.pathname) || document.title.toLowerCase().includes("onderhoud");
  if (isOnderhoud) return;

  // Altijd vragen om wachtwoord
  const invoer = (prompt("Voer het wachtwoord in om verder te gaan:") || "").trim();

  if (invoer === PRIVE) {
    // Altijd toegang, ook op donderdag
    window.__bbaAccessGranted = true;
    return;
  }

  if (invoer === NORMAAL) {
    if (dag === 4) {
      // Normaal wachtwoord op donderdag → onderhoudspagina
      window.location.replace("onderhoud.html");
      return;
    }
    // Normaal wachtwoord op andere dagen → toegang
    window.__bbaAccessGranted = true;
    return;
  }

  // Onjuist wachtwoord → wegsturen
  alert("Onjuist wachtwoord. Toegang geweigerd.");
  window.location.replace("https://www.google.com");
})();
</script>

<body>

  <!-- Navigatie -->
  <nav>
    <a href="index.html">
      <img src="BBA-Logo.png" alt="BBA Logo" width="80">
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="verjaardagen.html">Verjaardagen</a></li>
      <li><a href="fotos.html">Foto's</a></li>
      <li><a href="andere.html">Andere info</a></li>
    </ul>
  </nav>

  <!-- Hoofdinhoud -->
  <header>
    <p class="intro">
      Dit is de centrale plek voor ons rooster, verjaardagen, foto’s en verhalen.  
      Elke donderdag wordt de site bijgewerkt met nieuwe info en leuke updates.
    </p>
  </header>

  <main>
    <h2>Laatste update</h2>
    <p id="lastUpdate"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
