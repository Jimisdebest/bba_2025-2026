<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BBA Klassenwebsite - Home</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="BBA-Logo.png" type="image/x-icon">
</head>
  <script>
<script>
// Wachtwoorden instellen
const normaalWachtwoord = "bba_2025";
const priveWachtwoord = "Jimschool10";

// Huidige dag ophalen (0 = zondag, 4 = donderdag)
const vandaag = new Date();
const dagNummer = vandaag.getDay();

// Vraag altijd om wachtwoord
const invoer = prompt("Voer het wachtwoord in om verder te gaan:");

// Controleer wachtwoord
if (invoer === priveWachtwoord) {
  // Privé wachtwoord → altijd toegang
  console.log("Privé toegang verleend");
} 
else if (invoer === normaalWachtwoord) {
  if (dagNummer === 4) {
    // Donderdag → onderhoudspagina
    window.location.href = "onderhoud.html";
  } else {
    console.log("Normale toegang verleend");
  }
} 
else {
  // Fout wachtwoord → wegsturen
  alert("Onjuist wachtwoord. Toegang geweigerd.");
  window.location.href = "https://www.google.com";
}
</script>

<body>

  <!-- Navigatie -->
  <nav>
    <a href="index.html">
      <img src="BBA-Logo.png" alt="BBA Logo" width="80">
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="verjaardagen.html">Verjaardagen</a></li>
      <li><a href="fotos.html">Foto's</a></li>
      <li><a href="andere.html">Andere info</a></li>
    </ul>
  </nav>

  <!-- Hoofdinhoud -->
  <header>
    <p class="intro">
      Dit is de centrale plek voor ons rooster, verjaardagen, foto’s en verhalen.  
      Elke donderdag wordt de site bijgewerkt met nieuwe info en leuke updates.
    </p>
  </header>

  <main>
    <h2>Laatste update</h2>
    <p id="lastUpdate"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
