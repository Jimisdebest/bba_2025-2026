        const invoer = prompt("Voer het wachtwoord in voor de beveiliging van u / uw kind zijn gegevens en foto's");
        if (invoer !== wachtwoord) {
          alert("Het wachtwoord is onjuist");
          window.location.href = "https://www.bing.com";
          return;
        } else {
          localStorage.setItem("toegangBBA", "ok");
        }
