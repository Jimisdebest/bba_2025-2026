  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .gallery img:hover {
      transform: scale(1.05) rotate(-1deg);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    /* Lightbox overlay */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .lightbox:target {
      display: flex;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>De judofoto´s
  <div class="gallery">
    <a href="#img1"><img src="Judo 1.jpg" alt="Foto 1"></a>
    <a href="#img2"><img src="Judo 2.jpg" alt="Foto 2"></a>
    <a href="#img3"><img src="Judo 3.jpg" alt="Foto 3"></a>
    <a href="#img4"><img src="Judo 5.jpg" alt="Foto 4"></a>
  </div>

  <!-- Lightbox secties -->
  <div id="img1" class="lightbox">
    <a href="#" class="close">&times;</a>
    <img src="Judo 1.jpg" alt="Foto 1">
  </div>
  <div id="img2" class="lightbox">
    <a href="#" class="close">&times;</a>
    <img src="Judo 2.jpg" alt="Foto 2">
  </div>
  <div id="img3" class="lightbox">
    <a href="#" class="close">&times;</a>
    <img src="Judo 3.jpg" alt="Foto 3">
  </div>
  <div id="img4" class="lightbox">
    <a href="#" class="close">&times;</a>
    <img src="Judo 5.jpg" alt="Foto 4">
  </div>

  <script>
    // Extra effect: sluit lightbox met Escape
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        window.location.hash = "";
      }
    });
  </script>
</body>
</html>
