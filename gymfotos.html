<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gymfoto's Diavoorstelling</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="BBA-Logo.png" type="image/x-icon" />
</head>
<body>

  <!-- Muziek -->
  <audio id="bgMusic" src="achtergrondmuziekje.mp3" autoplay loop></audio>

  <!-- Verborgen galerij -->
  <div class="gallery" id="gallery" style="display:none;">
    <img src="gym1.jpg" alt="Gymles foto 1" data-caption="Samenwerken in de gymles">
    <img src="gym2.jpg" alt="Gymles foto 2" data-caption="De mat">
    <img src="gym3.jpg" alt="Gymles foto 3" data-caption="Hannah klimt over het blok">
    <img src="gym4.jpg" alt="Gymles foto 4" data-caption="Roos is het gelukt!">
    <img src="gym5.jpg" alt="Gymles foto 5" data-caption="Aloys klom er ook overheen">
    <img src="gym6.jpg" alt="Gymles foto 6" data-caption="De stokken...">
    <img src="gym7.jpg" alt="Gymles foto 7" data-caption="De mensenknoop is gelukt!">
    <img src="gym8.jpg" alt="Gymles foto 8" data-caption="Hadewijch is het ook gelukt">
    <img src="gym9.jpg" alt="Gymles foto 9" data-caption="Thijs had er plezier in!">
    <img src="gym10.jpg" alt="Gymles foto 10" data-caption="Cherelle kreeg hulp van Oscar en Aiden">
    <img src="gym11.jpg" alt="Gymles foto 11" data-caption="Wester hield een extra stok vast!">
    <img src="gym12.jpg" alt="Gymles foto 12" data-caption="Spannend maar veilig!">
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="modal open">
    <div class="lightbox-inner">
      <img id="lightbox-img" class="lightbox-img" alt="" />
      <div class="lightbox-meta" id="lightbox-caption"></div>
    </div>
  </div>

  <!-- Script -->
  <script>
    (function () {
      const gallery = document.getElementById('gallery');
      const imgs = Array.from(gallery.querySelectorAll('img'));
      const lbImg = document.getElementById('lightbox-img');
      const lbCaption = document.getElementById('lightbox-caption');
      let currentIndex = 0;

      function showImage(index) {
        const img = imgs[index];
        lbImg.src = img.src;
        lbImg.alt = img.alt || '';
        lbCaption.textContent = img.dataset.caption || '';
      }

      function startSlideshow() {
        showImage(currentIndex);
        const interval = setInterval(() => {
          currentIndex++;
          if (currentIndex >= imgs.length) {
            clearInterval(interval);
            window.location.href = "fotos.html";
          } else {
            showImage(currentIndex);
          }
        }, 5000);
      }

      window.addEventListener('load', () => {
        const music = document.getElementById('bgMusic');
        music.volume = 0.2;
        startSlideshow();
      });
    })();
  </script>

</body>
</html>
